<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday dita💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* BACKGROUND FOTO */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("foto.jpg") center/cover no-repeat;
    filter: blur(8px) brightness(0.5);
    z-index: -1;
}

/* CARD */
.card {
    text-align: center;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    animation: fadeIn 1.5s ease;
}

/* FOTO UTAMA */
.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-bottom: 15px;
}

h1 {
    font-size: 2rem;
}

h2 {
    color: #ffd700;
}

p {
    margin-top: 10px;
    font-size: 0.9rem;
}

.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #ff416c;
    color: white;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.1);
    background: #ff4b2b;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <!-- FOTO -->
    <img src="foto.jpg" class="profile">

    <h1>🎉 Happy Birthday 🎂</h1>
    <h2>Nama Dita 💖</h2>

    <p>
        Semoga hari kamu selalu penuh bahagia ✨<br>
        Tetap jadi orang spesial di hidupku 💕
    </p>

    <button class="btn" onclick="playMusic()">Buka Surprise 🎁</button>
</div>

<audio id="music" loop>
    <source src="lagu.mp3" type="audio/mp3">
</audio>

<script>
function playMusic() {
    document.getElementById("music").play();
    alert("Selamat ulang tahun 🎉💖");
}
</script>

</body>
</html>
